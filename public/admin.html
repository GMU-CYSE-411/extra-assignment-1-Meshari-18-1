<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <a class="back-link" href="/">Home</a>
        <h1>Admin</h1>
        <p class="muted">
          The client tries to present this as an admin page, but the browser is not a security boundary.
        </p>
        <div id="admin-warning" class="warning-box"></div>
      </section>

      <section class="panel">
        <h2>User Directory</h2>
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Role</th>
              <th>Display Name</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="admin-users"></tbody>
        </table>
      </section>
    </main>

    <script src="/js/shared.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
